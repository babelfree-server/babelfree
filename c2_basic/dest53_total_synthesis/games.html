<script>
var games = [
    // === GAME 1: Narrative — El peso de cincuenta y dos destinos ===
    {
        type: 'narrative',
        label: 'Narraci\u00f3n',
        instruction: 'Lee c\u00f3mo Yaguar\u00e1 contempla el camino recorrido y comprende que la integraci\u00f3n es la \u00faltima prueba. Observa las referencias a los tres mundos.',
        text: 'Yaguar\u00e1 subi\u00f3 al cerro de Monserrate y, desde la cima, contempl\u00f3 Bogot\u00e1 envuelta en su niebla perpetua. Llevaba cincuenta y dos destinos dentro del pecho: el Choc\u00f3, donde hab\u00eda aprendido a nombrar; los Andes, donde hab\u00eda aprendido a narrar; los Llanos, donde hab\u00eda aprendido a interpretar; la costa, donde hab\u00eda aprendido a argumentar; Santa Marta, donde hab\u00eda aprendido a analizar; Ciudad Perdida, donde hab\u00eda aprendido a producir; y Bogot\u00e1, donde hab\u00eda aprendido que el dominio del idioma no resid\u00eda en ninguna de estas habilidades por separado, sino en la capacidad de integrarlas todas en un solo acto de habla. Mir\u00f3 la ciudad y supo que le quedaba una \u00faltima prueba: demostrar que no solo conoc\u00eda cada registro, cada recurso, cada estructura, cada matiz, sino que pod\u00eda tejerlos todos en una voz que fuera, al mismo tiempo, suya e inconfundible.'
    },
    // === GAME 2: Narrative — Las voces que lleva dentro ===
    {
        type: 'narrative',
        label: 'Narraci\u00f3n',
        instruction: 'Lee sobre las voces que Yaguar\u00e1 ha integrado a lo largo de su viaje. Observa c\u00f3mo cada aliado representa una competencia ling\u00fc\u00edstica.',
        text: 'Cerr\u00f3 los ojos y escuch\u00f3 las voces que la habitaban. La de Mam\u00e1 Jaguar, que le hab\u00eda ense\u00f1ado que nombrar era el primer acto de existencia: \u00abLo que no se nombra, desaparece.\u00bb La de Colibr\u00ed, que le hab\u00eda ense\u00f1ado que la precisi\u00f3n era una forma de respeto: cada palabra justa, ni una m\u00e1s, ni una menos. La de C\u00f3ndor Viejo, que le hab\u00eda ense\u00f1ado que la misma historia cambia seg\u00fan la altura desde la que se mira: registro, perspectiva, punto de vista. La de Delf\u00edn Rosado, que le hab\u00eda ense\u00f1ado que las palabras mienten tanto como revelan: iron\u00eda, connotaci\u00f3n, doble sentido. La de Tortuga Marina, que le hab\u00eda ense\u00f1ado que algunas historias necesitan una vida entera para contarse: la paciencia de la subordinaci\u00f3n compleja, del texto que se despliega lentamente. La de su propia Sombra, que le hab\u00eda ense\u00f1ado que el miedo al error es el verdadero enemigo del hablante. Y la de Los Antiguos, que le hab\u00edan ense\u00f1ado que interpretar es un acto de creaci\u00f3n. Todas esas voces eran ahora una sola: la suya.'

    // === GAME 3: Narrative — La prueba de Los Antiguos ===

        text: 'Esa noche, las constelaciones sobre Bogot\u00e1 comenzaron a moverse. Los Antiguos se manifestaron: no como voces en el agua ni como petroglifos animados, sino como una presencia que ocupaba todo el cielo. \u00abYaguar\u00e1 \u2014dijeron, y su voz era el viento que baja del p\u00e1ramo\u2014, te hemos observado a lo largo de tres mundos. Has nombrado, has narrado, has argumentado, has analizado, has creado. Pero un guardi\u00e1n no es alguien que sabe hacer muchas cosas por separado: es alguien que, al hablar, las hace todas a la vez sin que se note el esfuerzo. Cuando un maestro del idioma escribe una columna de opini\u00f3n, no piensa: ahora uso ethos, ahora pathos, ahora un hip\u00e9rbaton. Simplemente habla, y todo est\u00e1 ah\u00ed porque se ha convertido en parte de su respiraci\u00f3n ling\u00fc\u00edstica. Esa es la prueba: no demostrar lo que sabes, sino olvidarlo para que hable a trav\u00e9s de ti.\u00bb'
    },

        text: 'Yaguar\u00e1 intent\u00f3. Se sent\u00f3 en la Plaza de Bol\u00edvar con un cuaderno y trat\u00f3 de escribir un texto que lo contuviera todo: una prosa con precisi\u00f3n acad\u00e9mica y vuelo literario, con la calidez del registro coloquial y la autoridad del formal, con conciencia metaling\u00fc\u00edstica y fuerza ret\u00f3rica. El resultado fue un monstruo: un texto correcto en cada frase pero falso en su conjunto, un ejercicio de acumulaci\u00f3n que no dec\u00eda nada porque intentaba decirlo todo. Yaguar\u00e1 llor\u00f3 de frustraci\u00f3n. Y entonces, una anciana que vend\u00eda arom\u00e1ticas en la plaza le dijo, sin saber a qui\u00e9n le hablaba ni por qu\u00e9 lloraba: \u00abMija, uno no habla para demostrar lo que sabe. Uno habla para que el otro entienda lo que uno siente.\u00bb Yaguar\u00e1 comprendi\u00f3: la s\u00edntesis no era sumar competencias; era tener tantas herramientas que una pod\u00eda elegir, en cada instante, la exacta, sin alarde, sin esfuerzo visible, como respira quien ya no piensa en respirar.'
