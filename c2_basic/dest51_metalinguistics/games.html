    // === GAME 1: Narrative — El espa\u00f1ol se mira a s\u00ed mismo ===
    {
        type: 'narrative',
        label: 'Narraci\u00f3n',
        instruction: 'Lee c\u00f3mo Yaguar\u00e1 descubre la metalingü\u00edstica: el lenguaje usado para reflexionar sobre el propio lenguaje.',
        text: 'En la Biblioteca Nacional, Yaguar\u00e1 encontr\u00f3 un libro cuyo t\u00edtulo la detuvo: El espa\u00f1ol habla sobre s\u00ed mismo. Lo abri\u00f3 y ley\u00f3: \u00abLa metalingü\u00edstica es la capacidad de usar la lengua para pensar sobre la lengua. Cuando dices "esa palabra no existe", est\u00e1s usando palabras para negar la existencia de una palabra. Cuando preguntas "\u00bfqu\u00e9 significa significar?", est\u00e1s usando el significado para interrogar al significado mismo. Esta capacidad reflexiva \u2014este espejo ling\u00fc\u00edstico\u2014 es lo que distingue al usuario avanzado del hablante nativo inconsciente: no solo habla la lengua, sino que entiende c\u00f3mo funciona, d\u00f3nde falla, qu\u00e9 puede decir y, sobre todo, qu\u00e9 no puede decir.\u00bb Yaguar\u00e1 comprendi\u00f3 que hab\u00eda llegado al \u00faltimo nivel de profundidad: ya no estaba dentro de la lengua mir\u00e1ndola desde adentro, sino fuera de ella, contemplándola como un objeto de estudio.'

        text: '\u00abEl espa\u00f1ol est\u00e1 lleno de trampas\u00bb, le dijo un lingü\u00edsta en un caf\u00e9 del centro. \u00abPero no son defectos: son caracter\u00edsticas. Toma la oraci\u00f3n "Vi al hombre con el telescopio". \u00bfQui\u00e9n tiene el telescopio, t\u00fa o el hombre? La gram\u00e1tica permite ambas lecturas, y solo el contexto resuelve la ambigüedad. O piensa en "Me dijo que ven\u00eda ma\u00f1ana". \u00bfQui\u00e9n viene, \u00e9l o yo? La misma estructura sint\u00e1ctica genera dos significados radicalmente distintos. Y luego est\u00e1n las ambigüedades l\u00e9xicas: "banco" puede ser donde te sientas o donde guardas el dinero; "gato" puede ser un animal, una herramienta mec\u00e1nica o, en Colombia, un hombre atractivo. El hablante C2 no solo identifica estas ambigüedades: las usa deliberadamente, juega con ellas, las explota para crear humor, iron\u00eda o profundidad.\u00bb'
