        text: 'En una librer\u00eda de la calle veintiuno, Yaguar\u00e1 encontr\u00f3 un letrero que rezaba: \u00abColombia: donde cada r\u00edo tiene un poeta y cada monta\u00f1a, un narrador.\u00bb Hasta ahora, su viaje hab\u00eda consistido en comprender \u2014escuchar, analizar, interpretar\u2014, pero la estrella gu\u00eda le palpitaba con un mensaje distinto: ya no bastaba con entender las palabras ajenas; hab\u00eda llegado el momento de crear las propias. La creaci\u00f3n literaria \u2014el cuento, la cr\u00f3nica, el poema, el ensayo con aspiraci\u00f3n est\u00e9tica\u2014 no era un lujo reservado a los escritores profesionales, sino la forma m\u00e1s alta de dominio ling\u00fc\u00edstico: aquella en la que el hablante ya no reproduce la lengua, sino que la inventa, la tuerce, la obliga a decir lo que nunca hab\u00eda dicho antes.'

        text: 'En el taller literario del barrio La Macarena, una escritora explicaba: \u00abCada historia exige una voz, y elegir mal la voz es como ponerse la ropa de otro: todo queda inc\u00f3modo. La primera persona \u2014"yo vi, yo sent\u00ed"\u2014 crea intimidad pero limita la perspectiva: solo puedes contar lo que tu narrador sabe. La tercera persona omnisciente \u2014"ella pens\u00f3, sin saber que \u00e9l tambi\u00e9n pensaba lo mismo"\u2014 lo ve todo, pero corre el riesgo de parecer un dios aburrido. La segunda persona \u2014"caminas por la calle y no sabes que alguien te observa"\u2014 es rara, arriesgada, pero cuando funciona, atrapa al lector dentro de la historia como una trampa. Y luego est\u00e1 el narrador no fiable, ese que miente sin decirte que miente, y que te obliga a leer entre l\u00edneas para descubrir la verdad que sus palabras esconden.\u00bb'
