<script>
var games = [

    /* ============================================================
       1. NARRATIVE \u2014 La Sombra appears in the pool

    {
        type: 'narrative',
        label: 'Narraci\u00f3n',

        text: 'Yaguar\u00e1 se acerca a una poza en los Llanos. El agua est\u00e1 quieta, oscura, perfecta como un espejo. Ve su reflejo. Pero algo est\u00e1 mal. El reflejo se mueve diferente \u2014 un segundo tarde, como si dudara. Luego habla. Y lo que dice no tiene sentido gramatical: frases rotas, verbos mal conjugados, palabras en orden equivocado. Yaguar\u00e1 retrocede. El reflejo sonr\u00ede. Y entonces habla claro, con su propia voz pero llena de veneno: \u00abNo vas a poder. Las palabras no son tuyas. Nunca vas a hablar bien. Cada vez que abres la boca, todos notan tus errores. \u00bfPor qu\u00e9 sigues intentando?\u00bb Yaguar\u00e1 siente que el est\u00f3mago se le encoge. Conoce esa voz. No viene de afuera \u2014 viene de adentro. Es La Sombra: su propio miedo a equivocarse.'
