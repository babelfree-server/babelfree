    ============================================================ */

        type: 'fill',

            { sentence: 'Don Pr\u00f3spero promete trabajo. ___, el bosque va a desaparecer.', answer: 'Sin embargo', options: ['Sin embargo', 'Porque', 'Ya que', 'Por eso'] },
