    // === GAME 1: Narrative — Los tres mundos convergen ===
    {

        label: 'Narración',
        instruction: 'Lee cómo los tres mundos del viaje convergen en un solo punto.',
        text: 'Yaguará estaba de pie en un lugar que no pertenecía a ningún mapa: un claro donde la selva del Chocó se fundía con las cumbres andinas, donde el río Amazonas desembocaba en el mar Caribe y donde las estrellas del llano brillaban a pleno día. Era imposible, y sin embargo estaba ocurriendo. Los tres mundos —el de Abajo, el del Medio, el de Arriba— habían convergido. Porque así funciona el dominio de una lengua: no es un camino lineal de lo simple a lo complejo, sino una espiral que regresa siempre a las mismas palabras, pero cada vez con más profundidad. El «hola» que Yaguará había aprendido en su primer destino no era el mismo «hola» que pronunciaba ahora. Contenía cincuenta y siete destinos de significado. Contenía familia, sonidos, agua, casa, comida, amigos. Contenía mercados, viajes, fiestas, historias, problemas, sueños. Contenía opiniones, trabajos, tradiciones, descubrimientos, conflictos, horizontes. Contenía interpretaciones, debates, metáforas, estructuras, análisis, síntesis. Contenía traducciones, crónicas, variaciones, guardianes. Un solo «hola» que era todos los mundos a la vez.'
    },

        text: 'Los Antiguos aparecieron por última vez. No como constelaciones ni como pinturas rupestres: esta vez se materializaron como lo que siempre habían sido: voces. Voces sin cuerpo, que hablaban desde todas las direcciones a la vez. «Hemos venido a hacerte una sola pregunta», dijeron. «No es sobre gramática. No es sobre vocabulario. No es sobre cultura ni sobre retórica. Es más sencilla que todo eso, y más difícil.» Yaguará esperó. «La pregunta es: ¿para qué sirve una lengua?» Y Yaguará comprendió que no había una respuesta correcta. Que la respuesta dependía de quién la pronunciara. Para un niño, una lengua servía para pedir agua. Para un poeta, para crear mundos. Para un abogado, para defender derechos. Para una madre, para cantar una nana. Para un médico, para nombrar el dolor. Para un maestro, para encender la comprensión. Para un traductor, para tender puentes. Para un lingüista, para entender la mente humana. «¿Y para ti?», preguntaron Los Antiguos. «¿Para qué sirve tu lengua?»'
    },
    // === GAME 3: Narrative — La Sombra habla por última vez ===

    },
    // === GAME 4: Narrative — La Palabra del Corazón ===
