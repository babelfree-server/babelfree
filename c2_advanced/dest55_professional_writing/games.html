<script>
var games = [
    // === GAME 1: Narrative — La cr\u00f3nica como oficio ===
    {
        type: 'narrative',
        label: 'Narraci\u00f3n',
        instruction: 'Lee c\u00f3mo Yaguar\u00e1 descubre que escribir profesionalmente es un oficio que exige disciplina, precisi\u00f3n y una voz propia.',
        text: 'Yaguar\u00e1 hab\u00eda cruzado tres mundos y acumulado historias suficientes para llenar bibliotecas. Pero una cosa era vivir una historia y otra muy distinta era escribirla de modo que otro pudiera vivirla al leerla. En Bogot\u00e1, una editora le hab\u00eda dicho: \u00abEscribir bien no es cuesti\u00f3n de talento. Es cuesti\u00f3n de oficio. El talento te da la primera frase; el oficio te da las siguientes trescientas.\u00bb Yaguar\u00e1 comprendi\u00f3 que la escritura profesional \u2014la que se publica, la que perdura, la que transforma\u2014 no era expresi\u00f3n espont\u00e1nea: era construcci\u00f3n deliberada. Cada p\u00e1rrafo ten\u00eda una arquitectura. Cada transici\u00f3n, una funci\u00f3n. Cada adjetivo superfluo era una deuda que el lector pagaba con su atenci\u00f3n. Y la atenci\u00f3n del lector era el bien m\u00e1s escaso del siglo XXI.'
    },
    // === GAME 2: Narrative — Garc\u00eda M\u00e1rquez periodista ===
    {
        type: 'narrative',
        label: 'Narraci\u00f3n',
        instruction: 'Lee sobre Garc\u00eda M\u00e1rquez como periodista y c\u00f3mo el periodismo forj\u00f3 su prosa literaria.',
        text: 'Antes de Cien a\u00f1os de soledad, Garc\u00eda M\u00e1rquez fue reportero. Y nunca dej\u00f3 de serlo. En una entrevista dec\u00eda: \u00abLa mejor formaci\u00f3n literaria es el periodismo, porque te obliga a ser claro, a ser breve y a no aburrir al lector. Un novelista que aburre puede excusarse con la \u201carte\u201d. Un periodista que aburre pierde su empleo.\u00bb Su cr\u00f3nica \u00abRelato de un n\u00e1ufrago\u00bb \u2014la historia real de un marinero que sobrevivi\u00f3 diez d\u00edas a la deriva\u2014 demostraba que la frontera entre periodismo y literatura no exist\u00eda cuando el escritor dominaba ambos oficios. La prosa era exacta como un bistur\u00ed y emotiva como una canci\u00f3n de cuna. Cada dato era verificable; cada frase, memorable. Yaguar\u00e1 entendi\u00f3 que escribir profesionalmente significaba eso: no elegir entre precisi\u00f3n y belleza, sino exigirse ambas.'
    },
    // === GAME 3: Narrative — La arquitectura del ensayo ===
    {
        type: 'narrative',
        label: 'Narraci\u00f3n',
        instruction: 'Lee sobre la estructura del ensayo como g\u00e9nero y las decisiones arquitect\u00f3nicas que implica.',
        text: 'Un ensayo no era un texto que se escrib\u00eda de principio a fin como quien sigue un r\u00edo: era un edificio que se dise\u00f1aba antes de construirse. La tesis \u2014la idea que el ensayo defend\u00eda\u2014 era la columna vertebral. Los argumentos eran los pilares. Las evidencias eran los cimientos. Las transiciones eran los pasillos que permit\u00edan al lector moverse de una habitaci\u00f3n a otra sin perderse. Y la conclusi\u00f3n no era un resumen: era una ventana que abr\u00eda el texto hacia afuera, dejando al lector con una idea m\u00e1s grande que la suma de sus partes. Yaguar\u00e1 record\u00f3 que C\u00f3ndor Viejo le hab\u00eda ense\u00f1ado a mirar desde arriba. Escribir un ensayo era exactamente eso: tener la visi\u00f3n panor\u00e1mica antes de descender a los detalles.'
    },
    // === GAME 4: Narrative — La revisi\u00f3n como escritura ===

        type: 'narrative',
        label: 'Narraci\u00f3n',
        instruction: 'Lee sobre el proceso de revisi\u00f3n y por qu\u00e9 la verdadera escritura ocurre en la reescritura.',
        text: 'La editora le dijo a Yaguar\u00e1: \u00abEl primer borrador es una conversaci\u00f3n contigo misma. El segundo borrador es una conversaci\u00f3n con el lector. El tercero es una conversaci\u00f3n con la verdad.\u00bb Borges dec\u00eda que publicaba sus textos no cuando estaban terminados, sino cuando estaba harto de corregirlos. Hemingway afirmaba haber reescrito el final de Adi\u00f3s a las armas treinta y nueve veces. Revisar no era corregir errores: era repensar cada decisi\u00f3n. \u00bfEste adjetivo a\u00f1ade informaci\u00f3n o solo decoraci\u00f3n? \u00bfEsta oraci\u00f3n funcionar\u00eda mejor al principio del p\u00e1rrafo? \u00bfEste dato es necesario o solo demuestra que investigo mucho? La escritura profesional era un acto de generosidad brutal: matar las frases que uno amaba si el texto las necesitaba muertas.'
    },
    // === GAME 5: Narrative — La voz propia ===

    // === GAME 6: Narrative — Escribir es elegir ===

    },

            { text: 'Un texto con buena ___ gu\u00eda al lector sin que este perciba el esfuerzo del escritor.', blank: 'fluidez', options: ['fluidez', 'complejidad', 'extensi\u00f3n', 'formalidad'] },
            { text: 'La regla period\u00edstica de la ___ invertida coloca la informaci\u00f3n m\u00e1s importante al principio.', blank: 'pir\u00e1mide', options: ['pir\u00e1mide', 'escalera', 'torre', 'espiral'] },
            { text: 'Un ___ editorial establece las normas de estilo que todo texto publicado en esa editorial debe seguir.', blank: 'manual', options: ['manual', 'libro', 'diccionario', 'cat\u00e1logo'] }

    {

            { text: 'El ensayo acad\u00e9mico requiere objetividad; ___, la columna de opini\u00f3n permite \u2014y exige\u2014 subjetividad expl\u00edcita.', blank: 'en cambio', options: ['en cambio', 'por lo tanto', 'asimismo', 'es decir'] },
            { text: '___ la brevedad del microrrelato, su construcci\u00f3n suele exigir m\u00e1s revisiones que la de una novela.', blank: 'Pese a', options: ['Pese a', 'Gracias a', 'Debido a', 'Seg\u00fan'] },

            { text: 'Un buen t\u00edtulo debe ser informativo, atractivo y breve; ___, debe reflejar con precisi\u00f3n el contenido del texto.', blank: 'ante todo', options: ['ante todo', 'en cambio', 'sin embargo', 'por ejemplo'] },
            { text: 'La revisi\u00f3n no consiste solo en corregir errores gramaticales; ___, implica repensar la estructura, el tono y la pertinencia de cada p\u00e1rrafo.', blank: 'antes bien', options: ['antes bien', 'por ejemplo', 'en suma', 'por cierto'] },
            { text: 'Cada g\u00e9nero textual tiene sus propias convenciones; ___, el dominio de esas convenciones es lo que permite al escritor transgredirlas con eficacia.', blank: 'precisamente', options: ['precisamente', 'sin embargo', 'por lo tanto', 'adem\u00e1s'] }
