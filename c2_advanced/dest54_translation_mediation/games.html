<script>
var games = [
    // === GAME 1: Narrative — El regreso ===
    {
        type: 'narrative',
        label: 'Narraci\u00f3n',
        instruction: 'Lee c\u00f3mo Yaguar\u00e1 regresa al Choc\u00f3 donde todo comenz\u00f3 y descubre que su misi\u00f3n no es restaurar, sino traducir.',
        text: 'Yaguar\u00e1 baj\u00f3 de Bogot\u00e1 siguiendo el curso del r\u00edo Atrato, y cuando la selva del Choc\u00f3 la recibi\u00f3 con su abrazo h\u00famedo y verde, sinti\u00f3 que el viaje se cerraba sobre s\u00ed mismo. Pero no era el mismo bosque, o quiz\u00e1 no era ella la misma. Antes, la selva le hablaba en sonidos que ella entend\u00eda sin pensar: el crujido de una rama, el canto de un tucán, el silencio que anuncia la lluvia. Ahora cargaba también otra lengua \u2014el español de cincuenta y tres destinos\u2014 y con ella, la capacidad de escuchar lo que los humanos decían sobre su bosque: los informes ambientales, los discursos políticos, las canciones de las comunidades afro. Comprendió que su papel ya no era nombrar ni argumentar ni analizar: era traducir. Ser el puente entre dos mundos que se necesitaban mutuamente pero que no se entendían.'
    },
    // === GAME 2: Narrative — Qué significa traducir ===
    {
        type: 'narrative',
        label: 'Narraci\u00f3n',
        instruction: 'Lee sobre la diferencia entre traducir palabras y traducir significados. Observa c\u00f3mo la mediaci\u00f3n va m\u00e1s all\u00e1 de la equivalencia ling\u00fc\u00edstica.',
        text: 'La primera lecci\u00f3n lleg\u00f3 cuando una comunidad ember\u00e1 del r\u00edo Baud\u00f3 intent\u00f3 explicarle a un equipo de bi\u00f3logos que su palabra para \u00abr\u00edo\u00bb no significaba \u00abcurso de agua\u00bb: significaba \u00abcamino que respira\u00bb. Los bi\u00f3logos necesitaban datos h\u00eddricos; los ember\u00e1 estaban hablando de una entidad viva con derechos y voluntad. Traducir la frase era trivial; traducir el significado exig\u00eda algo que ning\u00fan diccionario pod\u00eda ofrecer: la comprensi\u00f3n profunda de dos cosmovisi\u00f3nes y la capacidad de construir un tercer espacio donde ambas pudieran encontrarse sin que ninguna perdiera su verdad. Eso era la mediaci\u00f3n intercultural: no buscar equivalencias, sino crear puentes donde antes solo hab\u00eda orillas opuestas.'
    },
    // === GAME 3: Narrative — Traducci\u00f3n como traici\u00f3n creativa ===
    {
        type: 'narrative',
        label: 'Narraci\u00f3n',
        instruction: 'Lee sobre el viejo dilema de la traducci\u00f3n: \u00abtraduttore, traditore\u00bb. Observa c\u00f3mo toda traducci\u00f3n implica una negociaci\u00f3n de p\u00e9rdidas y ganancias.',
        text: 'Cóndor Viejo, que la había acompañado en los Andes, le había dicho una vez: \u00abDesde arriba, todo se ve distinto.\u00bb Pues bien, la traducción era exactamente eso: mirar la misma realidad desde otra altura y aceptar que algo siempre se pierde en el tránsito. El italiano lo resumía en un juego de palabras: traduttore, traditore \u2014traductor, traidor\u2014, porque traducir era inevitablemente traicionar algo del original. Pero Yaguará comprendió que la traición podía ser creativa: cuando García Márquez fue traducido al inglés por Gregory Rabassa, algo del ritmo caribeño se perdió, pero se ganó una cadencia que hizo que millones de angloparlantes sintieran el calor de Macondo en sus propias sílabas. Toda traducción era un duelo y una creación simultáneos: se enterraba una forma para que naciera otra.'
    },
    // === GAME 4: Narrative — Mediaci\u00f3n entre registros ===
    {
        type: 'narrative',

        text: 'Yaguará descubrió que la mediación no requería dos idiomas diferentes: dentro del español mismo, traducir entre registros era una forma de mediación igualmente compleja. Un médico que le explica a un paciente su diagnóstico está traduciendo del registro técnico al coloquial. Un periodista que convierte un informe científico en una noticia comprensible está mediando entre la academia y el público. Un maestro que explica la gramática a un niño está traduciendo la metalengua a un lenguaje accesible. En cada caso, el mediador debía tomar decisiones: ¿qué simplificar sin falsear? ¿Qué matiz preservar a costa de la claridad? ¿Cuándo la precisión importaba más que la comprensión, y cuándo era al revés? No había fórmulas: solo juicio, empatía y dominio absoluto de ambos registros.'

    // === GAME 5: Narrative — Las lenguas ind\u00edgenas de Colombia ===

        type: 'narrative',

        text: 'En Colombia se hablan más de sesenta y cinco lenguas indígenas, dos lenguas criollas y la lengua romaní. Yaguará lo supo siempre: en su selva natal, el emberá, el wounaan y el español convivían en un equilibrio frágil. Pero ahora entendía que la mediación entre estas lenguas no era un problema técnico de vocabulario: era un problema político de poder. Cuando un líder wayúu debía defender los derechos de su comunidad ante un tribunal que solo operaba en español, ¿quién traducía? ¿Y qué se perdía cuando conceptos como \u00abterritorio ancestral\u00bb \u2014que en wayuunaiki cargaba generaciones de memoria colectiva\u2014 se convertía en una categoría jurídica del derecho colombiano? El mediador intercultural no era un técnico: era un guardián de significados que operaba en la frontera donde las lenguas se tocaban y, a veces, se herían.'
    },

        text: 'Sentada junto al río Atrato, Yaguará comprendió que traducir y mediar eran los actos lingüísticos más altos que existían, porque exigían todo lo que había aprendido a lo largo de tres mundos: la precisión del A1 para nombrar sin ambigüedad; la narrativa del B1 para contar la historia del otro; la argumentación del B2 para defender la posición de ambas partes; el análisis del C1 para identificar lo que se pierde y lo que se gana; y la síntesis del C2 para crear un espacio donde dos verdades pudieran coexistir sin destruirse mutuamente. El guardián no era quien hablaba más fuerte, ni quien hablaba más bonito: era quien escuchaba dos voces que no se entendían entre sí y encontraba las palabras para que una pudiera, al fin, escuchar a la otra.'

    // === GAME 9: FIB — Mediaci\u00f3n entre registros ===
    {

            { text: 'Un m\u00e9dico que explica \u00abhipertensi\u00f3n arterial\u00bb como \u00abpresi\u00f3n alta\u00bb est\u00e1 realizando una mediaci\u00f3n de ___.', blank: 'registro', options: ['registro', 'idioma', 'cultura', 'g\u00e9nero'] },

    // === GAME 10: FIB — Falsos amigos y trampas de traducci\u00f3n ===
    {
