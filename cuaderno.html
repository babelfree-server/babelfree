<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El cuaderno de Candelaria — El Viaje del Jaguar</title>
    <link rel="stylesheet" href="luxury.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#c9a227">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(180deg, #1a1208 0%, #201810 40%, #1a1510 70%, #151010 100%);
        color: #e8d5b7;
        min-height: 100vh;
    }

    /* --- Header --- */
    .cn-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(20, 14, 6, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        border-bottom: 1px solid rgba(201, 162, 39, 0.12);
    }
    .cn-back {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(201, 162, 39, 0.08);
        border: 1px solid rgba(201, 162, 39, 0.15);
        color: #c9a227;
        text-decoration: none;
        font-size: 18px;
        transition: all 0.3s;
        flex-shrink: 0;
    }
    .cn-back:hover {
        background: rgba(201, 162, 39, 0.18);
        border-color: rgba(201, 162, 39, 0.3);
    }
    .cn-header-info {
        flex: 1;
    }
    .cn-header-title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 22px;
        font-weight: 600;
        color: #c9a227;
        margin: 0;
    }
    .cn-header-sub {
        font-size: 13px;
        color: #b8a48a;
        margin-top: 2px;
        font-style: italic;
    }

    /* --- Main content --- */
    .cn-body {
        max-width: 640px;
        margin: 0 auto;
        padding: 32px 24px 80px;
    }

    /* --- Section titles --- */
    .cn-section-title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 18px;
        font-weight: 600;
        color: #b8a48a;
        margin-bottom: 16px;
        letter-spacing: 0.03em;
        text-transform: lowercase;
        font-style: italic;
    }

    /* --- Bridge section --- */
    .cn-bridge-section {
        margin-bottom: 40px;
    }
    .cn-bridge-container {
        background: rgba(26, 18, 8, 0.5);
        border: 1px solid rgba(201, 162, 39, 0.1);
        border-radius: 16px;
        padding: 24px;
        min-height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* --- Rana section --- */
    .cn-rana-section {
        margin-bottom: 40px;
        text-align: center;
    }
    .cn-rana-container {
        background: rgba(26, 18, 8, 0.5);
        border: 1px solid rgba(201, 162, 39, 0.1);
        border-radius: 16px;
        padding: 24px;
        min-height: 180px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .cn-rana-name {
        margin-top: 16px;
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 20px;
        font-weight: 600;
        color: #c9a227;
        min-height: 28px;
    }

    /* --- Journal entries section --- */
    .cn-entries-section {
        margin-bottom: 40px;
    }
    .cn-entries-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
        max-height: 70vh;
        overflow-y: auto;
        padding-right: 4px;
    }
    .cn-entries-list::-webkit-scrollbar {
        width: 4px;
    }
    .cn-entries-list::-webkit-scrollbar-track {
        background: rgba(201, 162, 39, 0.05);
        border-radius: 2px;
    }
    .cn-entries-list::-webkit-scrollbar-thumb {
        background: rgba(201, 162, 39, 0.2);
        border-radius: 2px;
    }

    /* --- Empty state --- */
    .cn-empty {
        text-align: center;
        padding: 48px 24px;
        color: #b8a48a;
        font-style: italic;
    }
    .cn-empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.3;
    }

    /* --- Responsive --- */
    @media (max-width: 480px) {
        .cn-header { padding: 12px 16px; }
        .cn-header-title { font-size: 18px; }
        .cn-body { padding: 24px 16px 60px; }
        .cn-bridge-container,
        .cn-rana-container { padding: 16px; }
    }
    </style>
    <link rel="stylesheet" href="css/placeholder-illustrations.css?v=20260323">
</head>
<body>

    <!-- Header -->
    <header class="cn-header">
        <a href="/storymap" class="cn-back" aria-label="Volver al mapa">&#8592;</a>
        <div class="cn-header-info">
            <h1 class="cn-header-title">El cuaderno de Candelaria</h1>
            <div class="cn-header-sub">Las adivinanzas del viaje</div>
        </div>
    </header>

    <div class="cn-body">

        <!-- Bridge visualization -->
        <section class="cn-bridge-section">
            <div class="cn-section-title">el puente que construyes</div>
            <div class="cn-bridge-container yg-cuaderno-bridge" id="busquedaBridge">
                <div class="cn-empty">
                    <div class="cn-empty-icon">&#9776;</div>
                    <div>Resuelve adivinanzas para construir el puente</div>
                </div>
            </div>
        </section>

        <!-- Rana visualization -->
        <section class="cn-rana-section">
            <div class="cn-section-title">la rana dorada</div>
            <div class="cn-rana-container yg-cuaderno-rana" id="busquedaRana">
                <div class="cn-empty">
                    <div class="cn-empty-icon">&#10070;</div>
                    <div>La rana aparece poco a poco...</div>
                </div>
            </div>
            <div class="cn-rana-name yg-cuaderno-rana-name" id="busquedaRanaName"></div>
        </section>

        <!-- Journal entries -->
        <section class="cn-entries-section">
            <div class="cn-section-title">las adivinanzas resueltas</div>
            <div class="cn-entries-list yg-cuaderno-entries" id="busquedaEntries">
                <div class="cn-empty">
                    <div class="cn-empty-icon">&#128214;</div>
                    <div>Aún no has resuelto ninguna adivinanza</div>
                </div>
            </div>
        </section>

    </div>

<script src="js/jaguar-api.js"></script>
<script>
    // Auth guard
    if (window.JaguarAPI && !JaguarAPI.isAuthenticated()) {
        window.location.href = '/login';
    }
</script>
<script src="js/audio-manager.js"></script>
<script>if(window.AudioManager)AudioManager.init();</script>
<script src="js/tts-fallback.js"></script>
<script src="js/quest-journal.js"></script>
<script src="js/feedback-widget.js"></script>
</body>
</html>
