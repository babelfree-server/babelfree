<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El cuaderno de Candelaria — El Viaje del Jaguar</title>
    <link rel="stylesheet" href="luxury.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#c9a227">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(180deg, #1a1208 0%, #201810 40%, #1a1510 70%, #151010 100%);
        color: #e8d5b7;
        min-height: 100vh;
    }

    /* --- Header --- */
    .cn-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(20, 14, 6, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        border-bottom: 1px solid rgba(201, 162, 39, 0.12);
    }
    .cn-back {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(201, 162, 39, 0.08);
        border: 1px solid rgba(201, 162, 39, 0.15);
        color: #c9a227;
        text-decoration: none;
        font-size: 18px;
        transition: all 0.3s;
        flex-shrink: 0;
    }
    .cn-back:hover {
        background: rgba(201, 162, 39, 0.18);
        border-color: rgba(201, 162, 39, 0.3);
    }
    .cn-header-info {
        flex: 1;
    }
    .cn-header-title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 22px;
        font-weight: 600;
        color: #c9a227;
        margin: 0;
    }
    .cn-header-sub {
        font-size: 13px;
        color: #b8a48a;
        margin-top: 2px;
        font-style: italic;
    }

    /* --- Main content --- */
    .cn-body {
        max-width: 640px;
        margin: 0 auto;
        padding: 32px 24px 80px;
    }

    /* --- Section titles --- */
    .cn-section-title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 18px;
        font-weight: 600;
        color: #b8a48a;
        margin-bottom: 16px;
        letter-spacing: 0.03em;
        text-transform: lowercase;
        font-style: italic;
    }

    /* --- Bridge section --- */
    .cn-bridge-section {
        margin-bottom: 40px;
    }
    .cn-bridge-container {
        background: rgba(26, 18, 8, 0.5);
        border: 1px solid rgba(201, 162, 39, 0.1);
        border-radius: 16px;
        padding: 24px;
        min-height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* --- Rana section --- */
    .cn-rana-section {
        margin-bottom: 40px;
        text-align: center;
    }
    .cn-rana-container {
        background: rgba(26, 18, 8, 0.5);
        border: 1px solid rgba(201, 162, 39, 0.1);
        border-radius: 16px;
        padding: 24px;
        min-height: 180px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .cn-rana-name {
        margin-top: 16px;
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 20px;
        font-weight: 600;
        color: #c9a227;
        min-height: 28px;
    }

    /* --- Journal entries section --- */
    .cn-entries-section {
        margin-bottom: 40px;
    }
    .cn-entries-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
        max-height: 70vh;
        overflow-y: auto;
        padding-right: 4px;
    }
    .cn-entries-list::-webkit-scrollbar {
        width: 4px;
    }
    .cn-entries-list::-webkit-scrollbar-track {
        background: rgba(201, 162, 39, 0.05);
        border-radius: 2px;
    }
    .cn-entries-list::-webkit-scrollbar-thumb {
        background: rgba(201, 162, 39, 0.2);
        border-radius: 2px;
    }

    /* --- Empty state --- */
    .cn-empty {
        text-align: center;
        padding: 48px 24px;
        color: #b8a48a;
        font-style: italic;
    }
    .cn-empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.3;
    }

    /* --- Tabs --- */
    .cn-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 32px;
        border-bottom: 2px solid rgba(201, 162, 39, 0.15);
    }
    .cn-tab {
        flex: 1;
        padding: 14px 16px;
        text-align: center;
        cursor: pointer;
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 16px;
        font-weight: 600;
        color: #b8a48a;
        background: none;
        border: none;
        border-bottom: 3px solid transparent;
        transition: all 0.3s;
        margin-bottom: -2px;
    }
    .cn-tab:hover { color: #c9a227; }
    .cn-tab.active {
        color: #c9a227;
        border-bottom-color: #c9a227;
    }
    .cn-tab-panel { display: none; }
    .cn-tab-panel.active { display: block; }

    /* --- Mi Aventura tab --- */
    .av-progress {
        background: rgba(26, 18, 8, 0.5);
        border: 1px solid rgba(201, 162, 39, 0.15);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 28px;
        text-align: center;
    }
    .av-progress-bar {
        width: 100%;
        height: 8px;
        background: rgba(201, 162, 39, 0.1);
        border-radius: 4px;
        overflow: hidden;
        margin: 12px 0;
    }
    .av-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #c9a227, #d4af37);
        border-radius: 4px;
        transition: width 0.8s ease;
    }
    .av-progress-stats {
        display: flex;
        justify-content: center;
        gap: 24px;
        font-size: 13px;
        color: #b8a48a;
    }
    .av-progress-stat-num {
        color: #c9a227;
        font-weight: 700;
        font-size: 15px;
    }

    /* Chapter */
    .av-chapter {
        margin-bottom: 36px;
    }
    .av-chapter-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(201, 162, 39, 0.12);
    }
    .av-chapter-icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
    }
    .av-chapter-icon.abajo { background: rgba(76, 175, 80, 0.15); color: #4CAF50; }
    .av-chapter-icon.medio { background: rgba(201, 162, 39, 0.15); color: #c9a227; }
    .av-chapter-icon.arriba { background: rgba(156, 39, 176, 0.15); color: #CE93D8; }
    .av-chapter-title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 18px;
        font-weight: 600;
        color: #c9a227;
    }
    .av-chapter-subtitle {
        font-size: 13px;
        color: #b8a48a;
        font-style: italic;
    }

    /* Phase mosaic */
    .av-mosaic {
        background: rgba(26, 18, 8, 0.4);
        border: 1px solid rgba(201, 162, 39, 0.1);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 16px;
        text-align: center;
    }
    .av-mosaic-label {
        font-size: 12px;
        color: #b8a48a;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
    }
    .av-letters {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 0.15em;
        color: #c9a227;
        word-break: break-all;
    }
    .av-words {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 18px;
        font-weight: 400;
        font-style: italic;
        color: #e8d5b7;
        line-height: 1.6;
    }
    .av-sentences {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 16px;
        color: #e8d5b7;
        line-height: 1.7;
        text-align: left;
    }

    /* Landmark card */
    .av-landmark {
        background: rgba(26, 18, 8, 0.35);
        border: 1px solid rgba(201, 162, 39, 0.08);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
        transition: all 0.3s;
    }
    .av-landmark:hover {
        border-color: rgba(201, 162, 39, 0.25);
        background: rgba(26, 18, 8, 0.5);
    }
    .av-landmark.visited {
        border-color: rgba(201, 162, 39, 0.2);
    }
    .av-landmark.unvisited {
        opacity: 0.4;
    }
    .av-landmark-top {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 8px;
    }
    .av-landmark-pin {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(201, 162, 39, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
        color: #c9a227;
    }
    .av-landmark-name {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 16px;
        font-weight: 600;
        color: #e8d5b7;
    }
    .av-landmark-region {
        font-size: 12px;
        color: #b8a48a;
    }
    .av-landmark-desc {
        font-size: 14px;
        color: #c8b89a;
        font-style: italic;
        line-height: 1.5;
        margin-bottom: 8px;
    }
    .av-landmark-tourism {
        font-size: 13px;
        color: #8a7a6a;
        line-height: 1.4;
        padding: 8px 12px;
        background: rgba(201, 162, 39, 0.04);
        border-radius: 8px;
        border-left: 3px solid rgba(201, 162, 39, 0.15);
    }
    .av-landmark-cronica {
        margin-top: 10px;
        padding: 12px;
        background: rgba(76, 175, 80, 0.06);
        border-radius: 8px;
        border-left: 3px solid rgba(76, 175, 80, 0.3);
        font-size: 14px;
        color: #c8d5b7;
        line-height: 1.5;
    }
    .av-landmark-cronica-label {
        font-size: 11px;
        color: #4CAF50;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
    }
    .av-landmark-reward {
        margin-top: 8px;
        font-size: 14px;
        color: #c9a227;
        font-weight: 600;
    }

    /* Final reveal */
    .av-reveal {
        background: linear-gradient(135deg, rgba(201, 162, 39, 0.08) 0%, rgba(156, 39, 176, 0.05) 100%);
        border: 2px solid rgba(201, 162, 39, 0.3);
        border-radius: 16px;
        padding: 32px 24px;
        text-align: center;
        margin-top: 32px;
    }
    .av-reveal-title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 24px;
        font-weight: 600;
        color: #c9a227;
        margin-bottom: 8px;
    }
    .av-reveal-sub {
        font-size: 14px;
        color: #b8a48a;
        font-style: italic;
        margin-bottom: 20px;
    }
    .av-export-btn {
        display: inline-block;
        padding: 10px 24px;
        background: rgba(201, 162, 39, 0.15);
        border: 1px solid rgba(201, 162, 39, 0.3);
        border-radius: 8px;
        color: #c9a227;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s;
    }
    .av-export-btn:hover {
        background: rgba(201, 162, 39, 0.25);
    }

    /* --- Responsive --- */
    @media (max-width: 480px) {
        .cn-header { padding: 12px 16px; }
        .cn-header-title { font-size: 18px; }
        .cn-body { padding: 24px 16px 60px; }
        .cn-bridge-container,
        .cn-rana-container { padding: 16px; }
        .cn-tab { font-size: 14px; padding: 12px 8px; }
        .av-letters { font-size: 22px; }
        .av-landmark-top { gap: 8px; }
    }
    </style>
    <link rel="stylesheet" href="css/placeholder-illustrations.css?v=20260323">
</head>
<body>

    <!-- Header -->
    <header class="cn-header">
        <a href="/storymap" class="cn-back" aria-label="Volver al mapa">&#8592;</a>
        <div class="cn-header-info">
            <h1 class="cn-header-title">El cuaderno de Candelaria</h1>
            <div class="cn-header-sub">Las adivinanzas del viaje</div>
        </div>
    </header>

    <div class="cn-body">

        <!-- Tab navigation -->
        <nav class="cn-tabs" id="cnTabs">
            <button class="cn-tab active" data-tab="cuaderno">El cuaderno de Candelaria</button>
            <button class="cn-tab" data-tab="aventura">Mi aventura por Colombia</button>
        </nav>

        <!-- TAB 1: Cuaderno (existing) -->
        <div class="cn-tab-panel active" id="panel-cuaderno">

        <!-- Bridge visualization -->
        <section class="cn-bridge-section">
            <div class="cn-section-title">el puente que construyes</div>
            <div class="cn-bridge-container yg-cuaderno-bridge" id="busquedaBridge">
                <div class="cn-empty">
                    <div class="cn-empty-icon">&#9776;</div>
                    <div>Resuelve adivinanzas para construir el puente</div>
                </div>
            </div>
        </section>

        <!-- Rana visualization -->
        <section class="cn-rana-section">
            <div class="cn-section-title">la rana dorada</div>
            <div class="cn-rana-container yg-cuaderno-rana" id="busquedaRana">
                <div class="cn-empty">
                    <div class="cn-empty-icon">&#10070;</div>
                    <div>La rana aparece poco a poco...</div>
                </div>
            </div>
            <div class="cn-rana-name yg-cuaderno-rana-name" id="busquedaRanaName"></div>
        </section>

        <!-- Journal entries -->
        <section class="cn-entries-section">
            <div class="cn-section-title">las adivinanzas resueltas</div>
            <div class="cn-entries-list yg-cuaderno-entries" id="busquedaEntries">
                <div class="cn-empty">
                    <div class="cn-empty-icon">&#128214;</div>
                    <div>Aún no has resuelto ninguna adivinanza</div>
                </div>
            </div>
        </section>

        </div><!-- /panel-cuaderno -->

        <!-- TAB 2: Mi aventura por Colombia -->
        <div class="cn-tab-panel" id="panel-aventura">
            <div id="aventura-root"></div>
        </div>

    </div>

<script src="js/jaguar-api.js"></script>
<script>
    // Auth guard
    if (window.JaguarAPI && !JaguarAPI.isAuthenticated()) {
        window.location.href = '/login';
    }
</script>
<script src="js/audio-manager.js"></script>
<script>if(window.AudioManager)AudioManager.init();</script>
<script src="js/tts-fallback.js"></script>
<script src="js/composition-builder.js"></script>
<script src="js/quest-journal.js"></script>
<script src="js/aventura-tab.js"></script>
<script>
// Tab switching
(function () {
    var tabs = document.querySelectorAll('.cn-tab');
    tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
            tabs.forEach(function (t) { t.classList.remove('active'); });
            tab.classList.add('active');
            document.querySelectorAll('.cn-tab-panel').forEach(function (p) {
                p.classList.remove('active');
            });
            var target = tab.getAttribute('data-tab');
            var panel = document.getElementById('panel-' + target);
            if (panel) panel.classList.add('active');
            if (target === 'aventura' && window.AventuraTab) {
                AventuraTab.render('aventura-root');
            }
        });
    });
    // Check URL hash
    if (window.location.hash === '#aventura') {
        var avTab = document.querySelector('[data-tab="aventura"]');
        if (avTab) avTab.click();
    }
})();
</script>
<script src="js/feedback-widget.js"></script>
</body>
</html>
