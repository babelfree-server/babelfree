    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="luxury.css">
    <style>
        /* ===== Glossary-specific styles ===== */
        .glossary-page {
            min-height: 100vh; padding-top: 2rem;
        }
        .glossary-header {
            text-align: center; padding: 2rem 1.5rem 1rem;
        }
        .glossary-header h1 {
            font-family: var(--font-display); font-size: 2.2rem;
            background: var(--lux-gold-shimmer); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 0.3rem;
        }
        .glossary-header p {
            color: rgba(255,255,255,0.5); font-size: 0.95rem;
        }

        /* Stats bar */
        .stats-bar {
            display: flex; justify-content: center; gap: 2rem;
            padding: 1rem 1.5rem; margin-bottom: 1rem;
        }
        .stat-item { text-align: center; color: rgba(255,255,255,0.6); font-size: 0.85rem; }
        .stat-num {
            display: block; font-family: var(--font-display);
            font-size: 1.8rem; color: var(--lux-gold);
        }

        /* Ecosystem tabs */
        .eco-tabs {
            display: flex; gap: 0.5rem; padding: 0 1.5rem;
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; margin-bottom: 1rem;
        }
        .eco-tabs::-webkit-scrollbar { display: none; }
        .eco-tab {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.2rem; padding: 0.6rem 1rem; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.5); cursor: pointer; white-space: nowrap;
            transition: all 0.3s var(--lux-ease); font-size: 0.85rem;
            font-family: var(--font-body);
        }
        .eco-tab:hover { border-color: rgba(212,168,67,0.3); color: var(--lux-gold-light); }
        .eco-tab.active {
            border-color: var(--lux-gold); color: var(--lux-gold);
            background: rgba(212,168,67,0.08);
        }
        .eco-emoji { font-size: 1.3rem; }
        .eco-name { font-weight: 600; }

        /* Filters */
        .glossary-filters {
            display: flex; gap: 0.75rem; padding: 0 1.5rem;
            margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
        }
        .glossary-filters select, .glossary-filters input {
            padding: 0.5rem 0.8rem; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.8); font-family: var(--font-body);
            font-size: 0.9rem; transition: border-color 0.3s;
        }
        .glossary-filters select:focus, .glossary-filters input:focus {
            outline: none; border-color: var(--lux-gold);
        }
        .glossary-filters input { flex: 1; min-width: 150px; }
        .glossary-filters input::placeholder { color: rgba(255,255,255,0.3); }

        /* Word grid */
        .word-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem; padding: 0 1.5rem 3rem;
        }
        .word-card {
            padding: 0.8rem; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; background: rgba(255,255,255,0.04);
            cursor: pointer; transition: all 0.3s var(--lux-ease);
            display: flex; flex-direction: column; gap: 0.3rem;
        }
        .word-card:hover { border-color: var(--lux-gold); transform: translateY(-2px); }
        .word-card.mastered { border-color: rgba(76,175,80,0.3); }
        .word-card.practiced { border-color: rgba(255,152,0,0.3); }
        .word-card.seen { border-color: rgba(255,255,255,0.15); }

        .word-emoji { font-size: 1.4rem; }
        .word-text {
            font-family: var(--font-elegant); font-size: 1.05rem;
            color: rgba(255,255,255,0.85); font-weight: 600;
        }
        .word-badges { display: flex; align-items: center; gap: 0.4rem; }
        .cefr-badge {
            font-size: 0.6rem; font-weight: 700; padding: 1px 5px;
            border-radius: 3px; text-transform: uppercase; color: #fff;
        }
        .cefr-A1 { background: #4CAF50; }
        .cefr-A2 { background: #8BC34A; }
        .cefr-B1 { background: #FF9800; }
        .cefr-B2 { background: #FF5722; }
        .cefr-C1 { background: #9C27B0; }
        .cefr-C2 { background: #673AB7; }

        .mastery-dots { display: flex; gap: 3px; }
        .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,0.15);
        }
        .dot.filled { background: var(--lux-gold); }

        /* Word detail panel */
        .word-detail {
            position: fixed; right: -400px; top: 0; width: 400px; max-width: 90vw;
            height: 100vh; background: rgba(20,20,20,0.98);
            border-left: 1px solid rgba(212,168,67,0.2);
            padding: 2rem 1.5rem; overflow-y: auto; z-index: 600;
            transition: right 0.4s var(--lux-ease);
        }
        .word-detail.visible { right: 0; }

        .detail-close {
            position: absolute; top: 1rem; right: 1rem;
            background: none; border: none; color: rgba(255,255,255,0.5);
            font-size: 1.8rem; cursor: pointer; transition: color 0.3s;
        }
        .detail-close:hover { color: var(--lux-gold); }

        .detail-word {
            font-family: var(--font-display); font-size: 2rem;
            color: var(--lux-gold-light); margin-bottom: 0.5rem;
        }
        .detail-meta { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.5rem; }
        .detail-pos { font-style: italic; color: rgba(255,255,255,0.5); }
        .detail-gender { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
        .detail-ipa { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 0.75rem; }
        .detail-translation {
            font-size: 1.1rem; color: rgba(255,255,255,0.7);
            padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 1rem;
        }

        .detail-mastery {
            display: flex; align-items: center; gap: 1rem;
            padding: 0.75rem 0; margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .mastery-label {
            font-weight: 600; color: var(--lux-gold); font-size: 0.9rem;
        }
        .mastery-stats { color: rgba(255,255,255,0.4); font-size: 0.85rem; }

        .detail-section { margin-bottom: 1.5rem; }
        .detail-section h3 {
            font-family: var(--font-display); font-size: 1.1rem;
            color: rgba(255,255,255,0.6); margin-bottom: 0.5rem;
        }
        .detail-example { margin-bottom: 0.75rem; padding-left: 0.75rem; border-left: 2px solid var(--lux-gold); }
        .detail-ex-es { color: rgba(255,255,255,0.8); font-size: 0.95rem; }
        .detail-ex-gloss { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-top: 0.2rem; }

        .detail-dict-link {
            display: inline-block; color: var(--lux-gold); text-decoration: none;
            font-weight: 600; font-size: 0.9rem; padding: 0.5rem 0;
            transition: color 0.3s;
        }
        .detail-dict-link:hover { color: var(--lux-gold-light); }

        .glossary-loading, .glossary-empty {
            text-align: center; padding: 3rem 1rem;
            color: rgba(255,255,255,0.3); font-size: 1rem;
        }

        @media (max-width: 768px) {
            .glossary-header h1 { font-size: 1.6rem; }
            .stats-bar { gap: 1rem; }
            .stat-num { font-size: 1.4rem; }
            .word-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.5rem; }
            .word-detail { width: 100%; max-width: 100vw; }
        }
    </style>
</head>
<body>

<div class="glossary-page">
    <div class="glossary-header">
        <h1>Mi vocabulario</h1>
        <p>Las palabras que has encontrado en tu viaje</p>
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="stat-item"><span class="stat-num">-</span> seen</div>
        <div class="stat-item"><span class="stat-num">-</span> mastered</div>
        <div class="stat-item"><span class="stat-num">-</span> total</div>
    </div>

    <div class="eco-tabs" id="ecoTabs"></div>

    <div class="glossary-filters">
        <select id="levelFilter">
            <option value="">All levels</option>
            <option value="A1">A1</option>
            <option value="A2">A2</option>
            <option value="B1">B1</option>
            <option value="B2">B2</option>
            <option value="C1">C1</option>
            <option value="C2">C2</option>
        </select>
        <select id="masteryFilter">
            <option value="">All mastery</option>
            <option value="0">New</option>
            <option value="1">Seen</option>
            <option value="2">Practiced</option>
            <option value="3">Mastered</option>
        </select>
        <input type="text" id="glossarySearch" placeholder="Search words...">
    </div>

    <div class="word-grid" id="wordGrid">
        <div class="glossary-loading">Loading...</div>
    </div>
</div>

<div class="word-detail" id="wordDetail"></div>

<script src="js/jaguar-api.js"></script>
<script src="js/glossary.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/service-worker.js');}</script>

</body>
</html>
