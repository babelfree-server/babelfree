    // === GAME 1: Narrative — Las piedras que hablan ===
    {

        instruction: 'Lee c\u00f3mo Yaguar\u00e1 descubre la Ciudad Perdida y reflexiona sobre el poder persuasivo de las piedras tayrona. Observa las estructuras ret\u00f3ricas: preguntas ret\u00f3ricas, an\u00e1fora y conectores persuasivos.',
        text: 'Yaguar\u00e1 lleg\u00f3 a Teyuna cuando la niebla a\u00fan cubr\u00eda las terrazas de piedra como un velo antiguo. \u00bfQui\u00e9n hab\u00eda tallado esos escalones con tanta precisi\u00f3n? \u00bfQui\u00e9n hab\u00eda convencido a la monta\u00f1a de abrirse para dar paso a una ciudad entera? Las piedras no hablaban, y sin embargo persuad\u00edan. Persuad\u00edan al musgo de quedarse, persuad\u00edan al agua de seguir un camino exacto, persuad\u00edan al tiempo de no destruirlas. Es evidente que los tayrona no solo constru\u00edan ciudades: constru\u00edan argumentos en piedra. Cada terraza era una premisa; cada escalera, una conclusi\u00f3n. Nadie puede negar que esa arquitectura fue dise\u00f1ada para convencer \u2014no a los humanos, sino a la selva misma\u2014 de que aquel lugar merec\u00eda existir. Los Antiguos, guardianes invisibles de Teyuna, observaban a Yaguar\u00e1 desde las sombras. Cabe preguntarse si ella estaba preparada para lo que vendr\u00eda: aprender a distinguir la persuasi\u00f3n genuina de la manipulaci\u00f3n.'
