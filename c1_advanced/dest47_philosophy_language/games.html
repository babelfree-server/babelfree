    // === GAME 1: Narrative \u2014 Nombrar es crear ===

        instruction: 'Lee la reflexi\u00f3n de Yaguar\u00e1 al llegar a Teyuna. Observa c\u00f3mo el acto de nombrar se presenta como un acto de creaci\u00f3n.',
        text: 'Yaguar\u00e1 hab\u00eda subido m\u00e1s de mil doscientos escalones de piedra antes de llegar a las terrazas de Teyuna, la Ciudad Perdida. Los \u00e1rboles formaban una b\u00f3veda tan densa que la luz del sol apenas se filtraba en hilos dorados. Un mamo kogi la esperaba sentado sobre una roca cubierta de musgo. Sin mirarla, dijo: \u00abNosotros no descubrimos las cosas; las nombramos, y al nombrarlas les damos existencia. Si algo no tiene nombre en nuestra lengua, no es porque no exista, sino porque a\u00fan no hemos aprendido a escucharlo.\u00bb Yaguar\u00e1 sinti\u00f3 que esas palabras derrumbaban algo dentro de ella \u2014la creencia de que el lenguaje simplemente etiqueta una realidad preexistente\u2014. Para los kogi, el significante no se\u00f1ala al referente: lo engendra. En ese momento entendi\u00f3 que la filosof\u00eda del lenguaje no era una abstracci\u00f3n acad\u00e9mica, sino la pregunta m\u00e1s urgente que pod\u00eda hacerse: \u00bfqu\u00e9 mundo construimos cada vez que abrimos la boca?'
    },

        text: 'Esa noche, junto a la fogata, una ling\u00fcista wayuu llamada Aisawala le explic\u00f3 algo que cambi\u00f3 su manera de pensar: \u00abEn wayuunaiki, el idioma de mi pueblo, no existe una palabra exacta para la idea occidental de propiedad privada. No es que no entendamos el concepto; es que nuestra lengua organiza la realidad de otra forma. La tierra no se posee: se habita.\u00bb Yaguar\u00e1 record\u00f3 haber le\u00eddo sobre la hip\u00f3tesis de Sapir-Whorf, seg\u00fan la cual la lengua que hablamos no solo refleja nuestro pensamiento, sino que lo moldea. En su versi\u00f3n fuerte, esta hip\u00f3tesis sostiene que el lenguaje determina el pensamiento; en su versi\u00f3n d\u00e9bil, que lo influye. Aisawala sonri\u00f3: \u00abLos acad\u00e9micos debaten si es determinismo o influencia. Los wayuu simplemente vivimos dentro de las palabras que tenemos, y esas palabras nos hacen ver un mundo diferente al tuyo.\u00bb'
