<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión — El Viaje del Jaguar</title>
    <link rel="stylesheet" href="luxury.css">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #1a1208 0%, #1a2520 50%, #0d0d1a 100%);
            color: #e8d5b7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 24px;
        }
        .offline-card {
            text-align: center;
            max-width: 420px;
        }
        .offline-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 11%;
            transform: scale(1.9);
            border: 3px solid rgba(201, 162, 39, 0.3);
            margin-bottom: 48px;
            opacity: 0.7;
        }
        .offline-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.8rem;
            color: #c9a227;
            margin-bottom: 16px;
        }
        .offline-message {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 32px;
            opacity: 0.85;
        }
        .offline-btn {
            display: inline-block;
            padding: 14px 36px;
            background: rgba(201, 162, 39, 0.15);
            border: 1px solid rgba(201, 162, 39, 0.4);
            color: #c9a227;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .offline-btn:hover {
            background: rgba(201, 162, 39, 0.25);
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <img src="/img/jaguar-hero-full.jpg" alt="Yaguará" class="offline-img">
        <h1 class="offline-title">Sin conexión a internet</h1>
        <p class="offline-message">
            Yaguará espera pacientemente.<br>
            Vuelve cuando tengas conexión.
        </p>
        <button class="offline-btn" onclick="location.reload()">Intentar de nuevo</button>
    </div>
</body>
</html>
